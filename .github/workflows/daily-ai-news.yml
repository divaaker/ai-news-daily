name: Daily AI News Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 8 AM IST = 2:30 AM UTC (cron uses UTC)
    - cron: '30 2 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  generate-content:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run AI News Pipeline
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: |
          echo "Starting AI News Pipeline..."
          python ai_news_pipeline.py
          echo "Pipeline execution completed"
      
      - name: Check output directory
        if: always()
        run: |
          echo "Checking if output directory exists..."
          if [ -d "output" ]; then
            echo "✅ Output directory found"
            ls -la output/
          else
            echo "❌ Output directory not created"
            echo "Pipeline may have failed - check logs above"
          fi
      
      - name: Upload output artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ai-news-output-${{ github.run_number }}
          path: output/
          retention-days: 7
      
      - name: Commit and push if changed
        if: success()
        run: |
          git config --global user.name "AI News Bot"
          git config --global user.email "bot@example.com"
          git add -A || true
          git commit -m "🤖 Daily AI news generated - $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push || echo "Nothing to push"
